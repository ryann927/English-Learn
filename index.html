<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雅思云端学习平台</title>

<style>
    * {
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Microsoft Yahei", Arial, sans-serif;
    }

    body {
        max-width: 1120px;
        margin: 0 auto;
        padding: 36px 28px 72px;
        line-height: 1.65;
        background: linear-gradient(180deg, #f5f7fa 0%, #eef2f7 100%);
        color: #1d1d1f;
        font-size: 15px;
        -webkit-font-smoothing: antialiased;
    }

    .header-bar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 28px;
        padding: 36px 40px;
        margin-bottom: 28px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 28px;
        box-shadow:
            0 24px 60px rgba(15, 23, 42, 0.08),
            inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(18px);
    }

    h1 {
        margin: 0 0 12px;
        color: #111827;
        font-size: 38px;
        line-height: 1.12;
        letter-spacing: -1.2px;
        font-weight: 760;
    }

    .tip-text {
        margin: 0;
        color: #6b7280;
        font-size: 14.5px;
        letter-spacing: 0.1px;
    }

    #todayDate {
        font-size: 15px !important;
        font-weight: 650 !important;
        color: #374151 !important;
        margin-bottom: 8px !important;
    }

    #syncStatus {
        display: inline-block;
        color: #6b7280;
        font-size: 13px;
        background: rgba(249, 250, 251, 0.88);
        border: 1px solid #e5e7eb;
        border-radius: 999px;
        padding: 6px 12px;
    }

    body > button {
        margin-bottom: 12px;
    }

    button {
        appearance: none;
        background: rgba(255, 255, 255, 0.94);
        color: #1f2937;
        border: 1px solid rgba(209, 213, 219, 0.9);
        padding: 10px 18px;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-right: 8px;
        margin-bottom: 8px;
        transition: all 0.18s ease;
        box-shadow:
            0 4px 12px rgba(15, 23, 42, 0.045),
            inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    button:hover {
        background: #ffffff;
        border-color: #c7cdd6;
        transform: translateY(-1px);
        box-shadow:
            0 10px 24px rgba(15, 23, 42, 0.08),
            inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }

    button:active {
        transform: translateY(0);
        box-shadow:
            0 3px 10px rgba(15, 23, 42, 0.055),
            inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    button:nth-of-type(1),
    button:nth-of-type(2),
    button:nth-of-type(3),
    button:nth-of-type(5) {
        background: #007aff;
        color: #ffffff;
        border-color: #007aff;
    }

    button:nth-of-type(1):hover,
    button:nth-of-type(2):hover,
    button:nth-of-type(3):hover,
    button:nth-of-type(5):hover {
        background: #006ee6;
        border-color: #006ee6;
    }

    button[style*="background:#999"],
    button[style*="background: #999"] {
        background: #f3f4f6 !important;
        color: #6b7280 !important;
        border-color: #e5e7eb !important;
        box-shadow: none !important;
    }

    button[style*="background:#999"]:hover,
    button[style*="background: #999"]:hover {
        background: #e5e7eb !important;
        color: #374151 !important;
    }

    .section {
        margin: 24px 0;
        padding: 30px 34px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(229, 231, 235, 0.92);
        border-radius: 26px;
        box-shadow:
            0 18px 48px rgba(15, 23, 42, 0.07),
            inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(14px);
    }

    h2 {
        color: #111827;
        border-left: none;
        padding-left: 0;
        font-size: 22px;
        line-height: 1.3;
        margin-top: 0;
        margin-bottom: 22px;
        font-weight: 720;
        letter-spacing: -0.35px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    h2::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #007aff;
        box-shadow: 0 0 0 6px rgba(0, 122, 255, 0.12);
        flex: 0 0 auto;
    }

    h3 {
        color: #1f2937;
        font-size: 17px;
        margin: 24px 0 12px;
        font-weight: 680;
        letter-spacing: -0.15px;
    }

    h4 {
        color: #374151;
        font-size: 15px;
        margin: 18px 0 10px;
        font-weight: 650;
    }

    .word-item {
        margin: 0;
        padding: 10px 2px;
        font-size: 15px;
        color: #1f2937;
        border-bottom: 1px solid #f0f2f5;
    }

    .word-item:last-child {
        border-bottom: none;
    }

    .word-item strong {
        color: #0066cc;
        font-weight: 700;
    }

    .example-sentence {
        color: #6b7280;
        background: #f9fafb;
        padding: 9px 12px;
        margin: 8px 0 2px;
        border-left: 3px solid #d1d5db;
        border-radius: 10px;
        font-size: 14px;
        font-style: normal;
    }

    .test-block {
        margin: 10px 0;
        padding: 13px 15px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        color: #374151;
    }

    .long-sentence-card {
        background: #f9fafb;
        padding: 20px 20px;
        border-radius: 18px;
        margin: 16px 0;
        border: 1px solid #e5e7eb;
        color: #1f2937;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .long-sentence-card strong {
        color: #111827;
        font-weight: 700;
    }

    .answer-text {
        color: #166534;
        font-weight: 600;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 16px;
        padding: 15px 17px;
        margin-top: 14px;
    }

    #historyList button {
        background: #ffffff !important;
        color: #1f2937 !important;
        border: 1px solid #e5e7eb !important;
        border-radius: 14px !important;
        padding: 9px 15px !important;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.045) !important;
    }

    #historyList button:hover {
        background: #f9fafb !important;
        border-color: #c7cdd6 !important;
    }

    #historyDetail {
        margin-top: 16px;
    }

    ::selection {
        background: rgba(0, 122, 255, 0.18);
    }

    @media (max-width: 768px) {
        body {
            padding: 18px 14px 52px;
        }

        .header-bar {
            flex-direction: column;
            padding: 26px 22px;
            border-radius: 24px;
        }

        h1 {
            font-size: 30px;
        }

        button {
            width: 100%;
            margin: 5px 0;
            border-radius: 14px;
        }

        .section {
            padding: 22px 18px;
            border-radius: 22px;
        }
    }
    /* ===== 学习日历 ===== */

.calendar-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    padding: 20px;
    margin-top: 12px;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
}

.calendar-weekday {
    text-align: center;
    font-weight: 600;
    color: #6b7280;
    padding: 10px 0;
}

.calendar-day {
    min-height: 72px;
    border-radius: 12px;
    padding: 8px;
    text-align: center;
    border: 1px solid #e5e7eb;
}

.calendar-day.studied {
    background: #ecfdf5;
    border-color: #86efac;
}

.calendar-day.missed {
    background: #fef2f2;
    border-color: #fca5a5;
}

.calendar-day.future {
    background: #f3f4f6;
    color: #9ca3af;
}

.calendar-date {
    font-size: 18px;
    font-weight: 700;
}

.calendar-status {
    font-size: 12px;
    margin-top: 4px;
}
    /* ===== Apple 风按钮工具栏 ===== */

.action-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin: 28px 0 22px;
}

.action-bar button {
    margin: 0;
}

/* 重置旧的 nth-of-type 按钮规则影响 */
button:nth-of-type(1),
button:nth-of-type(2),
button:nth-of-type(3),
button:nth-of-type(5) {
    background: rgba(255, 255, 255, 0.92);
    color: #1f2937;
    border-color: rgba(209, 213, 219, 0.9);
}

/* 主按钮：只给登录和开始学习 */
.btn-primary {
    background: #007aff !important;
    color: #ffffff !important;
    border: 1px solid #007aff !important;
    border-radius: 14px !important;
    padding: 10px 18px !important;
    font-size: 14px !important;
    font-weight: 650 !important;
    box-shadow: 0 8px 20px rgba(0, 122, 255, 0.18) !important;
}

.btn-primary:hover {
    background: #006ee6 !important;
    border-color: #006ee6 !important;
    transform: translateY(-1px);
}

/* 次按钮：保存进度、学习日历 */
.btn-secondary {
    background: rgba(255, 255, 255, 0.92) !important;
    color: #1f2937 !important;
    border: 1px solid #d1d5db !important;
    border-radius: 14px !important;
    padding: 10px 18px !important;
    font-size: 14px !important;
    font-weight: 600 !important;
    box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05) !important;
}

.btn-secondary:hover {
    background: #ffffff !important;
    border-color: #bfc5ce !important;
    transform: translateY(-1px);
}

/* 弱按钮：退出登录 */
.btn-ghost {
    background: transparent !important;
    color: #6b7280 !important;
    border: 1px solid transparent !important;
    border-radius: 14px !important;
    padding: 10px 16px !important;
    font-size: 14px !important;
    font-weight: 600 !important;
    box-shadow: none !important;
}

.btn-ghost:hover {
    background: rgba(255, 255, 255, 0.7) !important;
    color: #374151 !important;
    border-color: #e5e7eb !important;
}
/* ===== ZCOOL-inspired clean layout ===== */

body {
    max-width: none !important;
    margin: 0 !important;
    padding: 0 !important;
    background: #f7f7f8 !important;
    color: #1f1f1f;
}

.app-layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
}

/* 左侧导航 */
.side-nav {
    background: #ffffff;
    border-right: 1px solid #eeeeef;
    padding: 26px 14px;
    position: sticky;
    top: 0;
    height: 100vh;
}

.brand-block {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 34px;
    padding: 0 8px;
}

.cat-logo-group {
    display: flex;
    align-items: center;
}

.cat-mark {
    width: 34px;
    height: 34px;
    border-radius: 12px;
    background: #1f1f1f;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    border: 2px solid #fff;
}

.cat-mark.silver {
    background: #e8eaed;
    color: #111827;
    margin-left: -8px;
}

.brand-name {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.3px;
}

.brand-sub {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 2px;
}

.nav-item {
    width: 100%;
    border: none !important;
    box-shadow: none !important;
    background: transparent !important;
    color: #333 !important;
    text-align: left;
    padding: 13px 18px !important;
    border-radius: 14px !important;
    font-size: 15px !important;
    font-weight: 600 !important;
    margin: 3px 0 !important;
    cursor: pointer;
}

.nav-item:hover {
    background: #f3f4f6 !important;
    transform: none !important;
}

.nav-item.active {
    background: #fff1ed !important;
    color: #ff5a3c !important;
}

.nav-item.muted {
    color: #8b8f97 !important;
}

.nav-divider {
    height: 1px;
    background: #eeeeef;
    margin: 18px 10px;
}

/* 主体 */
.main-content {
    padding: 28px 46px 70px;
}

/* 顶部栏 */
.top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
}

.search-pill {
    width: 460px;
    height: 48px;
    border-radius: 999px;
    background: #ffffff;
    border: 1px solid #eeeeef;
    display: flex;
    align-items: center;
    padding: 0 22px;
    color: #a1a1aa;
    font-size: 15px;
}

.top-status {
    display: flex;
    align-items: center;
    gap: 14px;
}

.date-text {
    font-size: 15px !important;
    font-weight: 700 !important;
    color: #27272a !important;
    margin: 0 !important;
}

.sync-pill {
    background: #ffffff !important;
    border: 1px solid #eeeeef !important;
    color: #71717a !important;
    border-radius: 999px !important;
    padding: 8px 14px !important;
    font-size: 13px !important;
}

/* 首页大卡片 */
.hero-panel {
    background: #ffffff;
    border-radius: 28px;
    padding: 44px 52px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 18px 45px rgba(15, 23, 42, 0.06);
}

.hero-panel h1 {
    font-size: 48px !important;
    line-height: 1.05 !important;
    letter-spacing: -1.6px !important;
    margin: 0 0 16px !important;
    color: #111827 !important;
}

.tip-text {
    font-size: 17px !important;
    color: #7b7f87 !important;
    margin: 0 !important;
}


.hero-actions {
    display: flex;
    align-items: center;
    gap: 10px;
}


.primary-action,
.secondary-action,
.text-action {
    border-radius: 12px !important;
    padding: 9px 16px !important;
    font-size: 14px !important;
    font-weight: 650 !important;
    box-shadow: none !important;
    margin: 0 !important;
    height: 40px !important;
    line-height: 1 !important;
}


.primary-action {
    background: #ff5a3c !important;
    color: #fff !important;
    border: 1px solid #ff5a3c !important;
    min-width: 118px !important;
}


.primary-action:hover {
    background: #f04d31 !important;
    border-color: #f04d31 !important;
    transform: none !important;
}


.secondary-action {
    background: #f4f4f5 !important;
    color: #1f2937 !important;
    border: 1px solid #ededee !important;
    min-width: 96px !important;
}


.secondary-action:hover {
    background: #ececef !important;
    transform: none !important;
}

/* 内容卡片 */
.section {
    background: #ffffff !important;
    border-radius: 24px !important;
    border: 1px solid #eeeeef !important;
    box-shadow: none !important;
    padding: 30px 34px !important;
    margin: 24px 0 !important;
}

.section h2 {
    border-left: none !important;
    padding-left: 0 !important;
    color: #111827 !important;
    font-size: 24px !important;
    letter-spacing: -0.5px;
}

.section h2::before {
    display: none !important;
}

/* 学习内容 */
.word-item {
    border-bottom: 1px solid #f1f1f2 !important;
    padding: 11px 0 !important;
}

.word-item strong {
    color: #111827 !important;
}

.example-sentence {
    background: #f8f8f9 !important;
    border-left: 3px solid #ff6b4a !important;
    color: #6b7280 !important;
}

.long-sentence-card {
    background: #f8f8f9 !important;
    border: 1px solid #eeeeef !important;
    border-radius: 18px !important;
    box-shadow: none !important;
}

.answer-text {
    background: #f7fbf8 !important;
    border: 1px solid #d8efdf !important;
    color: #247045 !important;
}

/* 学习日历适配 */
.calendar-card {
    background: #ffffff !important;
    border: 1px solid #eeeeef !important;
    border-radius: 22px !important;
    box-shadow: none !important;
}

.calendar-day {
    border-radius: 16px !important;
}

.calendar-day.studied {
    background: #ecfdf5 !important;
    border-color: #86efac !important;
}

.calendar-day.missed {
    background: #fff1f1 !important;
    border-color: #fecaca !important;
}

.calendar-day.future {
    background: #f4f4f5 !important;
    color: #a1a1aa !important;
}

/* 避免旧 body 直属按钮样式干扰 */
body > button {
    display: none !important;
}

/* 响应式 */
@media (max-width: 900px) {
    .app-layout {
        grid-template-columns: 1fr;
    }

    .side-nav {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid #eeeeef;
    }

    .main-content {
        padding: 22px 18px 50px;
    }

    .top-nav {
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
    }

    .search-pill {
        width: 100%;
    }

    .hero-panel {
        flex-direction: column;
        align-items: flex-start;
        gap: 24px;
        padding: 34px 28px;
    }

    .hero-panel h1 {
        font-size: 36px !important;
    }

    .hero-actions {
        width: 100%;
        flex-direction: column;
    }

    .hero-actions button {
        width: 100%;
    }
}
    .account-area {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
}


.login-top-btn {
    background: #ff5a3c !important;
    color: #fff !important;
    border: 1px solid #ff5a3c !important;
    border-radius: 12px !important;
    padding: 8px 15px !important;
    font-size: 13px !important;
    font-weight: 700 !important;
    box-shadow: none !important;
    margin: 0 !important;
    height: 36px !important;
}


.sync-mini {
    color: #9ca3af !important;
    font-size: 11px !important;
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
    line-height: 1.25 !important;
    font-weight: 400 !important;
}


.text-action {
    background: transparent !important;
    color: #8b8f97 !important;
    border: none !important;
    box-shadow: none !important;
    padding: 9px 6px !important;
    min-width: auto !important;
}

.text-action:hover {
    background: transparent !important;
    color: #ff5a3c !important;
 } 

.plan-card {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: flex-end;
}

.plan-card label {
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-weight: 700;
    color: #111827;
}

.plan-card input {
    width: 180px;
    height: 44px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    padding: 0 14px;
    font-size: 15px;
    outline: none;
    background: #fff;
}

.plan-card input:focus {
    border-color: #ff5a3c;
    box-shadow: 0 0 0 3px rgba(255, 90, 60, 0.12);
}

/* ===== 右上角登录状态 ===== */

.account-area {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
}

.login-top-btn {
    background: #ff5a3c !important;

    border: 1px solid #ff5a3c !important;
    border-radius: 14px !important;
    padding: 9px 16px !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    box-shadow: none !important;
    margin: 0 !important;
}

.user-chip {
    display: flex;
    align-items: center;
    gap: 9px;
    background: #ffffff;
    border: 1px solid #eeeeef;
    border-radius: 999px;
    padding: 7px 12px 7px 8px;
}

.user-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #ff5a3c;

    fileName: "ielts_data.json",

        let t = localStorage.getItem("gh_token");
        if (!t) {
            t = prompt("首次使用，请粘贴你的 GitHub Token（github_pat_ 开头）：\n\n填一次即可，浏览器会永久记住。");
            if (t) localStorage.setItem("gh_token", t.trim());
        }
        return t;

    get gistId() {
        let g = localStorage.getItem("gh_gist_id");

        return g;
    }
};
function isLoggedIn() {

}

    let nickname = localStorage.getItem("ielts_user_nickname");

    if (!nickname) {

        if (nickname) {
            nickname = nickname.trim();
            localStorage.setItem("ielts_user_nickname", nickname);

    if (brandSubEl && nickname) {

// 加载云端学习记录（从 GitHub Gist 读取）
async function initCloudData() {
    document.getElementById("syncStatus").innerText = "同步状态：正在从 GitHub 拉取数据...";
    try {
        const res = await fetch(`https://api.github.com/gists/${GITHUB_CONFIG.gistId}`, {
            headers: {
                "Authorization": `Bearer ${GITHUB_CONFIG.token}`,
                "Accept": "application/vnd.github+json"
            }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}：${res.statusText}`);
        const gist = await res.json();
        const fileContent = gist.files[GITHUB_CONFIG.fileName].content;
        cloudStudyData = JSON.parse(fileContent);

        // 兼容老数据：缺字段自动补上
        if (!cloudStudyData.learnedWords) cloudStudyData.learnedWords = [];
        if (!cloudStudyData.d1ReviewWords) cloudStudyData.d1ReviewWords = [];
        if (!cloudStudyData.d3ReviewWords) cloudStudyData.d3ReviewWords = [];
        if (!cloudStudyData.learnedSentences) cloudStudyData.learnedSentences = [];
        if (!cloudStudyData.lastStudyDate) cloudStudyData.lastStudyDate = "";
        if (!cloudStudyData.todayWords) cloudStudyData.todayWords = [];
        if (!cloudStudyData.todaySentences) cloudStudyData.todaySentences = [];
        if (!cloudStudyData.history) cloudStudyData.history = {};

        document.getElementById("syncStatus").innerText = "同步状态：云端数据加载完成 ";
        updateWelcomeText();
        alert("云端学习记录读取完毕，可以开始今日学习 📚");
    } catch (err) {
        document.getElementById("syncStatus").innerText = "同步失败：" + err.message;
        alert("云端读取失败：" + err.message + "\n\n请检查：\n1. Token 是否填对\n2. Gist ID 是否填对\n3. Token 是否有 gist 读写权限");
        console.error(err);
    }
}

// 保存进度到云端（更新 GitHub Gist）
async function saveProgressToCloud() {    
if (!isLoggedIn()) {
        alert("请先登录账号，再保存学习进度。");
        return;
    }

    document.getElementById("syncStatus").innerText = "同步状态：正在上传到 GitHub...";
    try {
        const res = await fetch(`https://api.github.com/gists/${GITHUB_CONFIG.gistId}`, {
            method: "PATCH",
            headers: {
                "Authorization": `Bearer ${GITHUB_CONFIG.token}`,
                "Accept": "application/vnd.github+json",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                files: {
                    [GITHUB_CONFIG.fileName]: {
                        content: JSON.stringify(cloudStudyData, null, 2)
                    }
                }
            })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}：${res.statusText}`);
        document.getElementById("syncStatus").innerText = "同步状态：进度已保存至云端 ✅";
        alert("今日学习进度已同步到 GitHub 云端 💾\n其他设备打开网页即可读取到最新进度。");
    } catch (err) {
        document.getElementById("syncStatus").innerText = "保存失败：" + err.message;
        alert("云端保存失败：" + err.message);
        console.error(err);
    }
}

function generateTodayContent() {
    if (!isLoggedIn()) {
        alert("请先登录账号，再开始今日学习。");
        return;
    }

    document.getElementById("rev1").style.display = "block";
    document.getElementById("rev3").style.display = "block";
    document.getElementById("newWordSec").style.display = "block";
    document.getElementById("sentSec").style.display = "block";

    const today = getTodayStr();
    let todayNewWords;
    let isNewDay = (cloudStudyData.lastStudyDate !== today);

    // 先保存“进入今天之前”的复习内容
    const reviewD1BeforeUpdate = cloudStudyData.d1ReviewWords || [];
    const reviewD3BeforeUpdate = cloudStudyData.d3ReviewWords || [];

    if (isNewDay) {
        const plan = getStudyPlan ? getStudyPlan() : { newWordCount: 25, sentenceCount: 5 };

        // 新的一天：生成今日新词
        todayNewWords = getUniqueNewWord(plan.newWordCount || 25);

        // 先显示今天内容，但不要立刻把今天新词显示成 D-1
        const wordNameList = todayNewWords.map(w => w.word);
        cloudStudyData.learnedWords = [...new Set([...cloudStudyData.learnedWords, ...wordNameList])];

        cloudStudyData.todayWords = todayNewWords;
        cloudStudyData.lastStudyDate = today;
        cloudStudyData.todaySentences = [];

        if (!cloudStudyData.history) cloudStudyData.history = {};
        cloudStudyData.history[today] = {
            words: todayNewWords,
            sentences: []
        };

        // 关键：更新“明天/后天要用的复习队列”
        // 今天页面上仍然显示 reviewD1BeforeUpdate / reviewD3BeforeUpdate
        cloudStudyData.d3ReviewWords = reviewD1BeforeUpdate;
        cloudStudyData.d1ReviewWords = todayNewWords.slice(0, 10);

        alert(`今天是 ${today}，已为你生成新一天的学习内容。`);
    } else {
        // 同一天再次点击：读取当天缓存
        todayNewWords = cloudStudyData.todayWords || [];

        if (!todayNewWords || todayNewWords.length === 0) {
            const plan = getStudyPlan ? getStudyPlan() : { newWordCount: 25, sentenceCount: 5 };
            todayNewWords = getUniqueNewWord(plan.newWordCount || 25);
            cloudStudyData.todayWords = todayNewWords;

            const wordNameList = todayNewWords.map(w => w.word);
            cloudStudyData.learnedWords = [...new Set([...cloudStudyData.learnedWords, ...wordNameList])];

            if (!cloudStudyData.history) cloudStudyData.history = {};
            cloudStudyData.history[today] = {
                words: todayNewWords,
                sentences: []
            };
        }

        alert(`今天（${today}）已生成过内容，为你显示当天学习内容。`);
    }

    // 重点：页面上显示的是“更新之前”的复习内容
    renderReviewBlock(reviewD1BeforeUpdate, "rev1List", "rev1Ans");
    renderReviewBlock(reviewD3BeforeUpdate, "rev3List", "rev3Ans");

    renderNewWordList(todayNewWords);
    createQuiz(todayNewWords.slice(10, 15));
    createLongSentenceBlock(isNewDay);
}

// 日期格式化：YYYY-MM-DD
function formatDateKey(dateObj) {
    const y = dateObj.getFullYear();
    const m = String(dateObj.getMonth() + 1).padStart(2, "0");
    const d = String(dateObj.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
}

// 渲染日历
function renderHistoryCalendar() {
    const history = cloudStudyData.history || {};
    const grid = document.getElementById("calendarGrid");
    const title = document.getElementById("calendarTitle");

    const year = calendarViewDate.getFullYear();
    const month = calendarViewDate.getMonth();

    title.innerText = `${year}年${month + 1}月`;

    const weekdays = ["一", "二", "三", "四", "五", "六", "日"];
    let html = "";

    weekdays.forEach(w => {
        html += `<div class="calendar-weekday">${w}</div>`;
    });

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);

    let startOffset = firstDay.getDay();
    startOffset = startOffset === 0 ? 6 : startOffset - 1;

    const daysInMonth = lastDay.getDate();

    const todayRaw = new Date();
    const todayOnly = new Date(
        todayRaw.getFullYear(),
        todayRaw.getMonth(),
        todayRaw.getDate()
    );

    const todayKey = formatDateKey(todayOnly);

    // 上个月补位
    const prevMonthLastDay = new Date(year, month, 0).getDate();

    for (let i = startOffset - 1; i >= 0; i--) {
        const dayNum = prevMonthLastDay - i;
        html += `
        <div class="calendar-day future">
            <div class="calendar-date">${dayNum}</div>
            <div class="calendar-status">—</div>
        </div>`;
    }

    // 当前月日期
    for (let day = 1; day <= daysInMonth; day++) {
        const dateObj = new Date(year, month, day);
        const dateKey = formatDateKey(dateObj);

        const hasStudy = !!history[dateKey];
        const isFuture = dateObj > todayOnly;
        const isToday = dateKey === todayKey;

        let cls = "calendar-day";
        let status = "";

        if (isFuture) {
            cls += " future";
            status = "未来";
        } else if (hasStudy) {
            cls += " studied";
            const wordCount = (history[dateKey].words || []).length;
            const sentCount = (history[dateKey].sentences || []).length;
            status = `${wordCount}词 · ${sentCount}句`;
        } else {
            cls += " missed";
            status = isToday ? "今天" : "未学习";
        }

        html += `
        <div class="${cls}" onclick="handleCalendarDayClick('${dateKey}')">
            <div class="calendar-date">${day}</div>
            <div class="calendar-status">${status}</div>
        </div>`;
    }

    // 下个月补位，补满 6 行
    const totalCells = startOffset + daysInMonth;
    const nextCells = 42 - totalCells;

    for (let i = 1; i <= nextCells; i++) {
        html += `
        <div class="calendar-day future">
            <div class="calendar-date">${i}</div>
            <div class="calendar-status">—</div>
        </div>`;
    }

    grid.innerHTML = html;
}

// 点击某一天
function handleCalendarDayClick(date) {
    const todayRaw = new Date();
    const todayOnly = new Date(
        todayRaw.getFullYear(),
        todayRaw.getMonth(),
        todayRaw.getDate()
    );

    const clickedDate = new Date(date);

    if (clickedDate > todayOnly) {
        return;
    }

    const dayData = (cloudStudyData.history || {})[date];

    if (!dayData) {
        document.getElementById("historyDetail").innerHTML = `
            <div class="long-sentence-card" style="background:#fff7f7;border-color:#fecaca;">
                <strong>📅 ${date}</strong><br><br>
                这一天没有学习记录。
            </div>
        `;
        document.getElementById("historyDetail").scrollIntoView({ behavior: "smooth" });
        return;
    }

    showHistoryDay(date);
}

    let todaySentences;

    if (isNewDay || cloudStudyData.todaySentences.length === 0) {
        const unused = fullSentenceBank.filter(s => !cloudStudyData.learnedSentences.includes(s.id));
        const pool = unused.length >= 5 ? unused : fullSentenceBank;
        todaySentences = pool.sort(() => Math.random() - 0.5).slice(0, 5);
        const todayIds = todaySentences.map(s => s.id);
        cloudStudyData.learnedSentences = [...new Set([...cloudStudyData.learnedSentences, ...todayIds])];
        cloudStudyData.todaySentences = todaySentences;
        // 也存到今天的历史记录里
        const today = getTodayStr();
        if (!cloudStudyData.history) cloudStudyData.history = {};
        if (!cloudStudyData.history[today]) cloudStudyData.history[today] = { words: [], sentences: [] };
        cloudStudyData.history[today].sentences = todaySentences;
    } else {
        todaySentences = cloudStudyData.todaySentences;
    }

    let sentHtml = "";
    todaySentences.forEach((s, idx) => {
        sentHtml += `
        <div class="long-sentence-card">
            <strong>长难句 ${idx+1}（话题：${s.topic}）</strong><br><br>
            <strong>原句：</strong>${s.sentence}<br><br>
            <strong>核心句式：</strong>${s.structure}<br>
            <strong>中文翻译：</strong>${s.translation}<br>
            <strong>仿写模板：</strong>${s.template}
        </div>`;
    });
    document.getElementById("sentArea").innerHTML = sentHtml;
}

</script>
</body>
</html>
